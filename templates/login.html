<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ModuleRisk Defect Prediction</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth-body">
    <div class="noise"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">⬡</span>
                    <span class="logo-text">ModuleRisk</span>
                </div>
                <p class="auth-subtitle">Sign in to your account</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-role="user">User Login</button>
                <button class="auth-tab" data-role="admin">Admin Login</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Remember me</span>
                    </label>
                </div>

                <div id="errorBox" class="error-box hidden"></div>

                <button type="submit" class="btn btn-primary btn-full">
                    <span class="btn-icon">🔐</span> Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span>OR</span>
            </div>

            <a href="/api/auth/google" class="btn btn-google btn-full">
                <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </a>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register">Register here</a></p>
            </div>

            <div class="demo-credentials">
                <p><strong>Demo Credentials:</strong></p>
                <p>User: <code>user / user123</code></p>
                <p>Admin: <code>admin / admin123</code></p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorBox = document.getElementById('errorBox');
        
        // Handle external errors passed via query params
        const urlParams = new URLSearchParams(window.location.search);
        const urlError = urlParams.get('error');
        if (urlError) {
            errorBox.textContent = '⚠ ' + urlError;
            errorBox.classList.remove('hidden');
        }
        
        const tabs = document.querySelectorAll('.auth-tab');

        let selectedRole = 'user';

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedRole = tab.dataset.role;
            });
        });

        function showError(msg) {
            errorBox.textContent = '⚠ ' + msg;
            errorBox.classList.remove('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            const submitBtn = loginForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role: selectedRole, remember })
                });

                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span class="btn-icon">🔐</span> Sign In';
                    return;
                }

                // Redirect based on role
                if (data.role === 'admin') {
                    window.location.href = '/admin/dashboard';
                } else {
                    window.location.href = '/dashboard';
                }

            } catch (e) {
                showError('Connection error: ' + e.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="btn-icon">🔐</span> Sign In';
            }
        });
    </script>
</body>

</html>
