<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management — ModuleRisk Admin</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="noise"></div>
    <header class="admin-header">
        <div class="logo">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">ModuleRisk</span>
            <span class="logo-tag admin-tag">ADMIN</span>
        </div>
        <nav>
            <span class="user-info">👤 <span id="currentUsername"></span></span>
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/users" class="nav-link active">Users</a>
            <a href="/admin/audit" class="nav-link">Audit Log</a>
            <a href="/dashboard" class="nav-link">Analysis</a>
            <a href="/api/auth/logout" class="btn btn-sm btn-outline">Logout</a>
        </nav>
    </header>

    <main>
        <section class="section">
            <div class="section-header">
                <h2>User <span class="accent-glow">Management</span></h2>
                <button class="btn btn-sm btn-primary" onclick="showAddUserModal()">+ Add User</button>
            </div>

            <div class="table-card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Created</th>
                                <th>Last Login</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr><td colspan="8" class="empty-row">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <!-- Add User Modal -->
    <div id="addUserModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div class="jira-config-card" style="width: 400px; max-width: 90%; background: var(--surface-light); padding: 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h3 style="margin:0; font-family:'Syne', sans-serif;">Add New User</h3>
                <button class="btn btn-sm btn-outline" onclick="closeAddUserModal()" style="padding: 4px 8px;">✕</button>
            </div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:8px; color:var(--text-muted); font-family:'IBM Plex Mono', monospace; font-size:12px;">Username</label>
                <input type="text" id="newUsername" placeholder="e.g. john_doe" style="width:100%; background:var(--surface-dark); border:1px solid rgba(255,255,255,0.1); color:var(--text-main); padding:10px; border-radius:6px;">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:8px; color:var(--text-muted); font-family:'IBM Plex Mono', monospace; font-size:12px;">Email</label>
                <input type="email" id="newEmail" placeholder="e.g. john@example.com" style="width:100%; background:var(--surface-dark); border:1px solid rgba(255,255,255,0.1); color:var(--text-main); padding:10px; border-radius:6px;">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:8px; color:var(--text-muted); font-family:'IBM Plex Mono', monospace; font-size:12px;">Password</label>
                <input type="password" id="newPassword" placeholder="Strong password" style="width:100%; background:var(--surface-dark); border:1px solid rgba(255,255,255,0.1); color:var(--text-main); padding:10px; border-radius:6px;">
            </div>
            
            <div id="modalError" class="error-box hidden" style="margin-bottom: 15px; color:var(--high); font-size:14px; display:none;"></div>
            
            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="submitNewUser()" id="submitUserBtn">Create User</button>
        </div>
    </div>

    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const data = await res.json();

                if (data.success) {
                    const body = document.getElementById('usersBody');
                    body.innerHTML = data.users.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                            <td><span class="badge badge-${u.role === 'admin' ? 'high' : 'low'}">${u.role.toUpperCase()}</span></td>
                            <td>${new Date(u.created_at).toLocaleDateString()}</td>
                            <td>${u.last_login ? new Date(u.last_login).toLocaleString() : 'Never'}</td>
                            <td>${u.is_active ? '<span style="color:var(--rate)">Active</span>' : '<span style="color:var(--high)">Inactive</span>'}</td>
                            <td>
                                <button class="btn btn-sm btn-outline" onclick="toggleUserStatus(${u.id}, ${u.is_active})">
                                    ${u.is_active ? 'Deactivate' : 'Activate'}
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                console.error('Users load error:', e);
                document.getElementById('usersBody').innerHTML = '<tr><td colspan="8" class="empty-row">Error loading users</td></tr>';
            }
        }

        async function toggleUserStatus(userId, currentStatus) {
            // TODO: Implement toggle status API
            alert('User status toggle coming soon!');
        }

        function showAddUserModal() {
            document.getElementById('addUserModal').style.display = 'flex';
            document.getElementById('modalError').style.display = 'none';
            document.getElementById('newUsername').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPassword').value = '';
        }

        function closeAddUserModal() {
            document.getElementById('addUserModal').style.display = 'none';
        }

        async function submitNewUser() {
            const username = document.getElementById('newUsername').value;
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPassword').value;
            const errorBox = document.getElementById('modalError');
            const btn = document.getElementById('submitUserBtn');
            
            if(!username || !email || !password) {
                errorBox.textContent = '⚠ All fields are required';
                errorBox.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Creating...';
            errorBox.style.display = 'none';
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    closeAddUserModal();
                    loadUsers();
                } else {
                    errorBox.textContent = '⚠ ' + (data.error || 'Registration failed');
                    errorBox.style.display = 'block';
                }
            } catch (e) {
                errorBox.textContent = '⚠ Server error';
                errorBox.style.display = 'block';
            }
            
            btn.disabled = false;
            btn.textContent = 'Create User';
        }

        loadUsers();
    </script>
</body>
</html>
